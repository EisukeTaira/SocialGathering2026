<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Score Input</title>
  <link rel="stylesheet" href="css/index.css">
  <style>
    body {
      background: #f5f5f5;
    }

    .score-app {
      max-width: 500px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .score-panel {
      flex: 1;
      display: grid;
      grid-template-rows: 1fr 1fr;
    }

    .team-box {
      border: 3px solid #000;
      margin: 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .score-btn {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      z-index: 2;
    }

    .team-name-input {
      font-size: 1.5rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .score-num {
      font-size: 5rem;
      font-weight: 900;
      font-family: 'Roboto Mono';
    }

    .controls {
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    .btn-minus {
      border: 2px solid #000;
      background: #fff;
      padding: 10px;
      font-weight: 900;
      flex: 1;
    }

    .status-banner {
      padding: 10px;
      text-align: center;
      font-weight: 900;
      text-transform: uppercase;
      border-bottom: 3px solid #000;
    }
  </style>
</head>

<body>
  <div class="score-app">
    <div id="status-banner" class="status-banner">読み込み中...</div>

    <div class="score-panel">
      <div class="team-box" id="box-a">
        <div class="team-name-input" id="name-a">チーム A</div>
        <div class="score-num" id="score-a">0</div>
        <button class="score-btn" onclick="addScore('A')"></button>
      </div>
      <div class="team-box" id="box-b">
        <div class="team-name-input" id="name-b">チーム B</div>
        <div class="score-num" id="score-b">0</div>
        <button class="score-btn" onclick="addScore('B')"></button>
      </div>
    </div>

    <div class="controls">
      <button class="btn-minus" onclick="subScore('A')">Aを -1</button>
      <button class="btn-minus" onclick="subScore('B')">Bを -1</button>
    </div>

    <div style="padding: 10px; font-size: 0.7rem; text-align: center; opacity: 0.5;">
      大きな枠をタップすると加点されます。<br>
      修正が必要な場合は下のボタンを使用してください。
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const courtId = urlParams.get('court') || '1';
    const API_URL = 'https://script.google.com/macros/s/AKfycbxIPOAT9PH96GssZTJrcHTe6rudJe531hfmMccHHjPXATSlxcjDrvYKiO1jbCufzEv-iA/exec';
    const api = new VolleyAPI(API_URL);

    let currentScore = { a: 0, b: 0 };
    let isPermitted = false;

    async function sync() {
      const matches = await api.fetchSheet('Matches');
      const scoreInputs = await api.fetchSheet('ScoreInput');

      const m = matches.find(match => match.コート番号 == courtId);
      const s = scoreInputs.find(si => si.コート番号 == courtId);

      if (m) {
        document.getElementById('name-a').textContent = m.チームA || 'TEAM A';
        document.getElementById('name-b').textContent = m.チームB || 'TEAM B';
      }

      if (s) {
        currentScore.a = s.チームA得点 || 0;
        currentScore.b = s.チームB得点 || 0;
        isPermitted = s.操作許可 === 'OK';

        document.getElementById('score-a').textContent = currentScore.a;
        document.getElementById('score-b').textContent = currentScore.b;

        const banner = document.getElementById('status-banner');
        banner.textContent = isPermitted ? `第 ${courtId} コート : 入力可能` : `第 ${courtId} コート : ロック中`;
        banner.style.background = isPermitted ? '#000' : '#f00';
        banner.style.color = '#fff';
      }
    }

    async function addScore(side) {
      if (!isPermitted) return alert('管理職によって入力がロックされています。');
      if (side === 'A') currentScore.a++;
      else currentScore.b++;
      updateRemote();
    }

    async function subScore(side) {
      if (!isPermitted) return alert('管理職によって入力がロックされています。');
      if (side === 'A' && currentScore.a > 0) currentScore.a--;
      if (side === 'B' && currentScore.b > 0) currentScore.b--;
      updateRemote();
    }

    async function updateRemote() {
      document.getElementById('score-a').textContent = currentScore.a;
      document.getElementById('score-b').textContent = currentScore.b;
      await api.postAction('updateScore', {
        court: courtId,
        scoreA: currentScore.a,
        scoreB: currentScore.b
      });
    }

    sync();
    setInterval(sync, 10000);
  </script>
</body>

</html>

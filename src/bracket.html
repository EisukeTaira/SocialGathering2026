<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VolleyManager | Bracket</title>
  <link rel="stylesheet" href="css/index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    .bracket-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 2rem;
      overflow-x: auto;
      padding-bottom: 5rem;
    }

    .bracket-svg-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    .match-node {
      border: var(--border-width) solid var(--color-border);
      background: var(--color-bg);
      width: 200px;
      padding: 0.5rem;
      position: absolute;
      text-align: center;
      transition: all 0.3s ease;
    }

    .match-node.current {
      background-color: var(--color-accent);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      border-width: 4px;
    }

    .match-node.next {
      border-style: dashed;
    }

    .team-slot {
      font-weight: 700;
      padding: 0.25rem;
      border-bottom: 1px solid #eee;
    }

    .team-slot:last-child {
      border-bottom: none;
    }

    .team-slot.winner {
      background: #000;
      color: #fff;
    }

    .bracket-wrapper {
      position: relative;
      width: 1000px;
      height: 600px;
    }
  </style>
</head>

<body>
  <div class="container">
    <header style="margin-bottom: 2rem;">
      <a href="index.html" style="text-decoration: none; color: #000; font-weight: 900;">← コート一覧に戻る</a>
      <h1 id="court-title" style="margin-top: 1rem;">第 - コート - トーナメント表</h1>
    </header>

    <div class="bracket-container">
      <div id="bracket-root" class="bracket-wrapper">
        <svg id="bracket-svg" class="bracket-svg-layer"></svg>
        <!-- Nodes will be injected here -->
      </div>
    </div>

    <section style="margin-top: 4rem;">
      <h2 style="border-bottom: var(--border-width) solid #000; padding-bottom: 0.5rem; margin-bottom: 1rem;">エントリーチーム一覧
      </h2>
      <div id="teams-list" class="grid-6" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
        <!-- Teams will be injected here -->
      </div>
    </section>
  </div>

  <script src="js/common.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const courtId = urlParams.get('court') || '1';
    document.getElementById('court-title').textContent = `第 ${courtId} コート - トーナメント表`;

    // Replace with actual GAS URL
    const API_URL = 'https://script.google.com/macros/s/AKfycbxIPOAT9PH96GssZTJrcHTe6rudJe531hfmMccHHjPXATSlxcjDrvYKiO1jbCufzEv-iA/exec';
    const api = new VolleyAPI(API_URL);

    async function initBracket() {
      const scriptId = 'YOUR_SCRIPT_ID'; // Ensure this is set
      const bracketData = await api.fetchSheet('Bracket');
      const matchesData = await api.fetchSheet('Matches');
      const teamsData = await api.fetchSheet('Teams');

      const courtMatches = bracketData.filter(b => b.コート番号 == courtId);
      const currentCourtMatch = matchesData.find(m => m.コート番号 == courtId);

      renderBracket(courtMatches, currentCourtMatch);
      renderTeams(teamsData.filter(t => t.コート番号 == courtId));
    }

    function renderBracket(data, currentMatch) {
      const root = document.getElementById('bracket-root');
      const svg = document.getElementById('bracket-svg');
      root.querySelectorAll('.match-node').forEach(n => n.remove());
      svg.innerHTML = '';

      // Simple Layout Mapping (Manual for 6-team structure as specified)
      // Bottom up: R1 -> R2 -> Final
      const layout = {
        'M1': { x: 100, y: 450 },
        'M2': { x: 400, y: 450 },
        'M3': { x: 100, y: 250 },
        'M4': { x: 400, y: 250 },
        'M5': { x: 250, y: 50 },
        'L1': { x: 700, y: 450 }, // Loser match 1
        'L2': { x: 700, y: 250 }  // Loser match 2 or 3rd place
      };

      data.forEach(m => {
        const pos = layout[m.ID];
        if (!pos) return;

        const isCurrent = currentMatch &&
          ((m.チームA === currentMatch.チームA && m.チームB === currentMatch.チームB) ||
            (m.チームB === currentMatch.チームA && m.チームA === currentMatch.チームB));

        const node = document.createElement('div');
        node.className = `match-node ${isCurrent ? 'current' : ''}`;
        node.style.left = `${pos.x}px`;
        node.style.top = `${pos.y}px`;

        node.innerHTML = `
          <div style="font-size: 0.6rem; font-weight: 900; opacity: 0.5;">${m.ID} - ${m.ラウンド}</div>
          <div class="team-slot ${m.勝者名 === m.チームA ? 'winner' : ''}">${m.チームA || '?'}</div>
          <div class="score-display" style="font-family: 'Roboto Mono'; font-weight: 700; font-size: 0.8rem; margin: 2px 0;">
            ${m.A得点 || 0} : ${m.B得点 || 0}
          </div>
          <div class="team-slot ${m.勝者名 === m.チームB ? 'winner' : ''}">${m.チームB || '?'}</div>
        `;
        root.appendChild(node);

        // Draw lines to next match
        if (m.次の試合ID && layout[m.次の試合ID]) {
          const nextPos = layout[m.次の試合ID];
          drawLine(pos.x + 100, pos.y, nextPos.x + 100, nextPos.y + 60, svg);
        }
      });
    }

    function drawLine(x1, y1, x2, y2, svg) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const d = `M ${x1} ${y1} L ${x1} ${(y1 + y2) / 2} L ${x2} ${(y1 + y2) / 2} L ${x2} ${y2}`;
      line.setAttribute('d', d);
      line.setAttribute('stroke', '#000');
      line.setAttribute('stroke-width', '2');
      line.setAttribute('fill', 'none');
      svg.appendChild(line);
    }

    function renderTeams(teams) {
      const list = document.getElementById('teams-list');
      list.innerHTML = teams.map(t => `
        <div class="card" style="padding: 1rem; text-align: center;">
          <div class="team-name" style="font-size: 1rem;">${t.チーム名}</div>
          <div style="font-size: 0.7rem; opacity: 0.6; margin-top: 0.5rem;">${t.備考 || ''}</div>
        </div>
      `).join('');
    }

    initBracket();
    setInterval(initBracket, 10000); // Update every 10s
  </script>
</body>

</html>
